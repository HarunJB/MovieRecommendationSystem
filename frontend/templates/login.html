{% extends "base.html" %}

{% block title %}Login — CineMatch{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="text-center mb-4">
                    <h1 class="auth-brand"><i class="bi bi-film"></i> CineMatch</h1>
                    <p class="text-muted">Your personal movie recommendation engine</p>
                </div>

                <div class="card auth-card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4">Welcome back</h4>

                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Login</button>
                            </div>
                        </form>
                    </div>
                </div>

                <p class="text-center mt-3 text-muted">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Register</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
