{% extends "base.html" %} {% block title %}Register — CineMatch{% endblock %} {%
block content %}
<div
  class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100"
>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <h1 class="auth-brand"><i class="bi bi-film"></i> CineMatch</h1>
          <p class="text-muted">Your personal movie recommendation engine</p>
        </div>

        <div class="card auth-card shadow-sm">
          <div class="card-body p-4">
            <h4 class="card-title mb-4">Create an account</h4>

            <form method="POST" action="{{ url_for('auth.register') }}">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  required
                  autofocus
                />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="confirm_password" class="form-label"
                  >Confirm Password</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="confirm_password"
                  name="confirm_password"
                  required
                />
              </div>
              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                  Register
                </button>
              </div>
            </form>
          </div>
        </div>

        <p class="text-center mt-3 text-muted">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="text-decoration-none"
            >Login</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  // Client-side password match check before submit
  document.querySelector("form").addEventListener("submit", function (e) {
    const pw = document.getElementById("password").value;
    const cpw = document.getElementById("confirm_password").value;
    if (pw !== cpw) {
      e.preventDefault();
      alert("Passwords do not match.");
    }
  });
</script>
{% endblock %}
